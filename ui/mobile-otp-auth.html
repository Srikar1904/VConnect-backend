<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Connect - Mobile OTP Authentication</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 24px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        input[type="tel"] {
            font-size: 16px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .section {
            border-top: 2px solid #eee;
            padding-top: 30px;
            margin-top: 30px;
        }

        .section:first-of-type {
            border-top: none;
            padding-top: 0;
            margin-top: 0;
        }

        .section h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 20px;
        }

        .hidden {
            display: none !important;
        }

        .info-text {
            font-size: 12px;
            color: #666;
            margin-top: 8px;
        }

        .tab-buttons {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .tab-btn {
            flex: 1;
            padding: 10px;
            background: #f0f0f0;
            border: 2px solid #ddd;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 500;
            transition: all 0.3s;
        }

        .tab-btn.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
        }
    </style>
<script src="../ui/js/translator.js"></script>
</head>
<body>
    <div class="container">
        <h1>📱 V-Connect Mobile Auth</h1>

        <div class="tab-buttons">
            <button class="tab-btn active" onclick="switchTab('register')">Register</button>
            <button class="tab-btn" onclick="switchTab('login')">Login</button>
            <button class="tab-btn" onclick="switchTab('profile')">Profile</button>
        </div>

        <!-- REGISTER TAB -->
        <div id="register" class="tab-content active">
            <h2>📝 Register with Mobile OTP</h2>
            
            <div class="form-group">
                <label for="regMobile">Mobile Number</label>
                <input 
                    type="tel" 
                    id="regMobile" 
                    placeholder="+919876543210"
                >
                <p class="info-text">Include country code (e.g., +91 for India)</p>
            </div>

            <div class="form-group">
                <label for="regName">Full Name (Optional)</label>
                <input 
                    type="text" 
                    id="regName" 
                    placeholder="Your Name"
                >
            </div>

            <button onclick="registerSendOTP()">Send OTP</button>

            <div id="regOtpContainer" class="hidden">
                <div class="form-group" style="margin-top: 20px;">
                    <label for="regOtp">Enter OTP</label>
                    <input 
                        type="text" 
                        id="regOtp" 
                        placeholder="123456"
                        maxlength="6"
                    >
                    <p class="info-text">Check your registered mobile for OTP</p>
                </div>
                <button onclick="registerVerifyOTP()">Verify & Register</button>
            </div>

            <div id="regStatus" class="status"></div>
        </div>

        <!-- LOGIN TAB -->
        <div id="login" class="tab-content">
            <h2>🔐 Login with Mobile OTP</h2>
            
            <div class="form-group">
                <label for="loginMobile">Mobile Number</label>
                <input 
                    type="tel" 
                    id="loginMobile" 
                    placeholder="+919876543210"
                >
                <p class="info-text">Your registered mobile number</p>
            </div>

            <button onclick="loginSendOTP()">Send OTP</button>

            <div id="loginOtpContainer" class="hidden">
                <div class="form-group" style="margin-top: 20px;">
                    <label for="loginOtp">Enter OTP</label>
                    <input 
                        type="text" 
                        id="loginOtp" 
                        placeholder="123456"
                        maxlength="6"
                    >
                    <p class="info-text">OTP sent via SMS</p>
                </div>
                <button onclick="loginVerifyOTP()">Verify & Login</button>
            </div>

            <div id="loginStatus" class="status"></div>
        </div>

        <!-- PROFILE UPDATE TAB -->
        <div id="profile" class="tab-content">
            <h2>👤 Update Profile</h2>
            
            <div class="form-group">
                <label for="profMobile">Mobile Number</label>
                <input 
                    type="tel" 
                    id="profMobile" 
                    placeholder="+919876543210"
                >
            </div>

            <button onclick="profileSendOTP()">Send OTP</button>

            <div id="profOtpContainer" class="hidden">
                <div class="form-group" style="margin-top: 20px;">
                    <label for="profOtp">Enter OTP</label>
                    <input 
                        type="text" 
                        id="profOtp" 
                        placeholder="123456"
                        maxlength="6"
                    >
                </div>
                <button onclick="profileVerifyOTP()">Verify OTP</button>
            </div>

            <!-- Profile Form (shown after OTP verification) -->
            <div id="profileForm" class="hidden">
                <div class="form-group">
                    <label for="profName">Full Name</label>
                    <input type="text" id="profName" placeholder="Your Name">
                </div>

                <div class="form-group">
                    <label for="profVillage">Village</label>
                    <input type="text" id="profVillage" placeholder="Village Name">
                </div>

                <div class="form-group">
                    <label for="profMandal">Mandal</label>
                    <input type="text" id="profMandal" placeholder="Mandal Name">
                </div>

                <div class="form-group">
                    <label for="profDistrict">District</label>
                    <input type="text" id="profDistrict" placeholder="District Name">
                </div>

                <div class="form-group">
                    <label for="profAadhaar">Aadhaar Number</label>
                    <input type="text" id="profAadhaar" placeholder="XXXX XXXX XXXX 1234">
                </div>

                <button onclick="saveProfile()">Save Profile</button>
            </div>

            <div id="profStatus" class="status"></div>
        </div>
    </div>

    <script>
        // Tab switching
        function switchTab(tabName) {
            // Hide all tabs
            document.querySelectorAll('.tab-content').forEach(tab => {
                tab.classList.remove('active');
            });
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.classList.remove('active');
            });

            // Show selected tab
            document.getElementById(tabName).classList.add('active');
            event.target.classList.add('active');
        }

        // Utility function to show status messages
        function showStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = 'status show ' + type;
            setTimeout(() => {
                if (type === 'success') element.classList.remove('show');
            }, 5000);
        }

        // ==================== REGISTER FUNCTIONS ====================
        async function registerSendOTP() {
            const mobile = document.getElementById('regMobile').value.trim();

            if (!mobile) {
                showStatus('regStatus', '❌ Please enter mobile number', 'error');
                return;
            }

            if (!/^\+?\d{10,15}$/.test(mobile.replace(/[^0-9+]/g, ''))) {
                showStatus('regStatus', '❌ Invalid mobile number format', 'error');
                return;
            }

            try {
                showStatus('regStatus', '⏳ Sending OTP...', 'info');

                const response = await fetch('/api/send-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile })
                });

                const data = await response.json();

                if (data.success) {
                    showStatus('regStatus', `✅ OTP sent to ${mobile}`, 'success');
                    document.getElementById('regOtpContainer').classList.remove('hidden');
                    document.getElementById('regOtp').focus();
                } else {
                    showStatus('regStatus', `❌ ${data.error || 'Failed to send OTP'}`, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('regStatus', '❌ Network error', 'error');
            }
        }

        async function registerVerifyOTP() {
            const mobile = document.getElementById('regMobile').value.trim();
            const otp = document.getElementById('regOtp').value.trim();
            const name = document.getElementById('regName').value.trim();

            if (!otp || otp.length !== 6) {
                showStatus('regStatus', '❌ Please enter 6-digit OTP', 'error');
                return;
            }

            try {
                showStatus('regStatus', '⏳ Verifying OTP...', 'info');

                const response = await fetch('/api/register/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        mobile,
                        otp,
                        full_name: name
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showStatus('regStatus', '✅ Registration successful! Go to Login tab.', 'success');
                    document.getElementById('regMobile').value = '';
                    document.getElementById('regOtp').value = '';
                    document.getElementById('regName').value = '';
                    document.getElementById('regOtpContainer').classList.add('hidden');
                } else {
                    showStatus('regStatus', `❌ ${data.error || 'Registration failed'}`, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('regStatus', '❌ Network error', 'error');
            }
        }

        // ==================== LOGIN FUNCTIONS ====================
        async function loginSendOTP() {
            const mobile = document.getElementById('loginMobile').value.trim();

            if (!mobile) {
                showStatus('loginStatus', '❌ Please enter mobile number', 'error');
                return;
            }

            if (!/^\+?\d{10,15}$/.test(mobile.replace(/[^0-9+]/g, ''))) {
                showStatus('loginStatus', '❌ Invalid mobile number format', 'error');
                return;
            }

            try {
                showStatus('loginStatus', '⏳ Sending OTP...', 'info');

                const response = await fetch('/api/login', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile })
                });

                const data = await response.json();

                if (data.success) {
                    showStatus('loginStatus', `✅ OTP sent to ${mobile}`, 'success');
                    document.getElementById('loginOtpContainer').classList.remove('hidden');
                    document.getElementById('loginOtp').focus();
                } else {
                    const msg = data.notFound ? 
                        '❌ Mobile not registered. Go to Register tab.' : 
                        `❌ ${data.message || 'Failed to send OTP'}`;
                    showStatus('loginStatus', msg, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('loginStatus', '❌ Network error', 'error');
            }
        }

        async function loginVerifyOTP() {
            const mobile = document.getElementById('loginMobile').value.trim();
            const otp = document.getElementById('loginOtp').value.trim();

            if (!otp || otp.length !== 6) {
                showStatus('loginStatus', '❌ Please enter 6-digit OTP', 'error');
                return;
            }

            try {
                showStatus('loginStatus', '⏳ Verifying OTP...', 'info');

                const response = await fetch('/api/login/verify', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile, otp })
                });

                const data = await response.json();

                if (data.success) {
                    showStatus('loginStatus', `✅ Login successful! Welcome ${data.user.full_name}`, 'success');
                    
                    // Store user info in session
                    sessionStorage.setItem('user', JSON.stringify(data.user));
                    
                    // Clear form
                    document.getElementById('loginMobile').value = '';
                    document.getElementById('loginOtp').value = '';
                    document.getElementById('loginOtpContainer').classList.add('hidden');
                    
                    console.log('Logged in user:', data.user);
                } else {
                    showStatus('loginStatus', `❌ ${data.error || 'Login failed'}`, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('loginStatus', '❌ Network error', 'error');
            }
        }

        // ==================== PROFILE FUNCTIONS ====================
        async function profileSendOTP() {
            const mobile = document.getElementById('profMobile').value.trim();

            if (!mobile) {
                showStatus('profStatus', '❌ Please enter mobile number', 'error');
                return;
            }

            if (!/^\+?\d{10,15}$/.test(mobile.replace(/[^0-9+]/g, ''))) {
                showStatus('profStatus', '❌ Invalid mobile number format', 'error');
                return;
            }

            try {
                showStatus('profStatus', '⏳ Sending OTP...', 'info');

                const response = await fetch('/api/send-profile-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile })
                });

                const data = await response.json();

                if (data.success) {
                    showStatus('profStatus', `✅ OTP sent to ${mobile}`, 'success');
                    document.getElementById('profOtpContainer').classList.remove('hidden');
                    document.getElementById('profOtp').focus();
                } else {
                    showStatus('profStatus', `❌ ${data.error || 'Failed to send OTP'}`, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('profStatus', '❌ Network error', 'error');
            }
        }

        async function profileVerifyOTP() {
            const mobile = document.getElementById('profMobile').value.trim();
            const otp = document.getElementById('profOtp').value.trim();

            if (!otp || otp.length !== 6) {
                showStatus('profStatus', '❌ Please enter 6-digit OTP', 'error');
                return;
            }

            try {
                showStatus('profStatus', '⏳ Verifying OTP...', 'info');

                const response = await fetch('/api/verify-otp', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ mobile, otp })
                });

                const data = await response.json();

                if (data.verified) {
                    showStatus('profStatus', '✅ OTP verified! Fill in your details below.', 'success');
                    document.getElementById('profOtpContainer').classList.add('hidden');
                    document.getElementById('profileForm').classList.remove('hidden');
                } else {
                    showStatus('profStatus', `❌ ${data.message || 'Verification failed'}`, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('profStatus', '❌ Network error', 'error');
            }
        }

        async function saveProfile() {
            const mobile = document.getElementById('profMobile').value.trim();
            const otp = document.getElementById('profOtp').value.trim();

            const profileData = {
                mobile,
                otp,
                full_name: document.getElementById('profName').value.trim(),
                village: document.getElementById('profVillage').value.trim(),
                mandal: document.getElementById('profMandal').value.trim(),
                district: document.getElementById('profDistrict').value.trim(),
                aadhaar: document.getElementById('profAadhaar').value.trim(),
                profile_image: ''
            };

            if (!profileData.full_name) {
                showStatus('profStatus', '❌ Please enter your name', 'error');
                return;
            }

            try {
                showStatus('profStatus', '⏳ Saving profile...', 'info');

                const response = await fetch('/api/update-profile', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(profileData)
                });

                const data = await response.json();

                if (data.success) {
                    showStatus('profStatus', '✅ Profile updated successfully!', 'success');
                    
                    // Reset form
                    document.getElementById('profMobile').value = '';
                    document.getElementById('profOtp').value = '';
                    document.getElementById('profName').value = '';
                    document.getElementById('profVillage').value = '';
                    document.getElementById('profMandal').value = '';
                    document.getElementById('profDistrict').value = '';
                    document.getElementById('profAadhaar').value = '';
                    document.getElementById('profileForm').classList.add('hidden');
                } else {
                    showStatus('profStatus', `❌ ${data.error || 'Failed to save profile'}`, 'error');
                }
            } catch (error) {
                console.error('Error:', error);
                showStatus('profStatus', '❌ Network error', 'error');
            }
        }
    </script>
</body>
</html>
