<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>V-Connect - Firebase OTP Verification</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            padding: 40px;
            max-width: 500px;
            width: 100%;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 500;
        }

        input[type="text"],
        input[type="email"],
        input[type="tel"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #5568d3;
        }

        button:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .status {
            margin-top: 15px;
            padding: 12px;
            border-radius: 5px;
            text-align: center;
            font-weight: 500;
            display: none;
        }

        .status.show {
            display: block;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
        }

        .section {
            border-top: 2px solid #eee;
            padding-top: 30px;
            margin-top: 30px;
        }

        .section:first-of-type {
            border-top: none;
            padding-top: 0;
            margin-top: 0;
        }

        .section h2 {
            color: #333;
            font-size: 18px;
            margin-bottom: 20px;
        }

        #recaptcha-container {
            margin: 20px 0;
        }

        .divider {
            text-align: center;
            margin: 20px 0;
            color: #999;
        }
    </style>
<script src="../ui/js/translator.js"></script>
</head>
<body>
    <div class="container">
        <!-- Section 1: Registration with OTP -->
        <div class="section">
            <h2>📱 Register with OTP Verification</h2>
            
            <div class="form-group">
                <label for="regPhone">Phone Number</label>
                <input 
                    type="tel" 
                    id="regPhone" 
                    placeholder="+919876543210"
                    pattern="^\+\d{1,3}\d{6,14}$"
                >
            </div>

            <div class="form-group">
                <label for="regEmail">Email Address</label>
                <input 
                    type="email" 
                    id="regEmail" 
                    placeholder="your@email.com"
                >
            </div>

            <button onclick="generateOTP()">Send OTP</button>

            <div id="regOtpContainer" style="display: none; margin-top: 20px;">
                <div class="form-group">
                    <label for="regOtpInput">Enter OTP</label>
                    <input 
                        type="text" 
                        id="regOtpInput" 
                        placeholder="123456"
                        maxlength="6"
                    >
                </div>
                <button onclick="verifyRegistrationOTP()">Verify OTP</button>
            </div>

            <div id="regStatus" class="status"></div>
        </div>

        <!-- Section 2: Profile Update with OTP -->
        <div class="section">
            <h2>👤 Update Profile with OTP</h2>

            <div class="form-group">
                <label for="profilePhone">Phone Number</label>
                <input 
                    type="tel" 
                    id="profilePhone" 
                    placeholder="+919876543210"
                >
            </div>

            <div class="form-group">
                <label for="profileEmail">Email</label>
                <input 
                    type="email" 
                    id="profileEmail" 
                    placeholder="your@email.com"
                >
            </div>

            <button onclick="sendProfileUpdateOTP()">Send Profile Update OTP</button>

            <div id="profileOtpContainer" style="display: none; margin-top: 20px;">
                <div class="form-group">
                    <label for="profileOtpInput">Enter OTP</label>
                    <input 
                        type="text" 
                        id="profileOtpInput" 
                        placeholder="123456"
                        maxlength="6"
                    >
                </div>
                <button onclick="verifyProfileUpdateOTP()">Verify OTP</button>
            </div>

            <div id="profileOtpStatus" class="status"></div>
            <div id="profileVerifyStatus" class="status"></div>

            <!-- Profile Details (shown after OTP verification) -->
            <div id="profileForm" style="display: none; margin-top: 20px;">
                <div class="form-group">
                    <label for="fullName">Full Name</label>
                    <input type="text" id="fullName" placeholder="John Doe">
                </div>

                <div class="form-group">
                    <label for="village">Village</label>
                    <input type="text" id="village" placeholder="Village Name">
                </div>

                <div class="form-group">
                    <label for="mandal">Mandal</label>
                    <input type="text" id="mandal" placeholder="Mandal Name">
                </div>

                <div class="form-group">
                    <label for="district">District</label>
                    <input type="text" id="district" placeholder="District Name">
                </div>

                <div class="form-group">
                    <label for="aadhaar">Aadhaar Number</label>
                    <input type="text" id="aadhaar" placeholder="XXXX XXXX XXXX 1234">
                </div>

                <div class="form-group">
                    <label for="profileImage">Profile Image URL</label>
                    <input type="text" id="profileImage" placeholder="https://example.com/image.jpg">
                </div>

                <button id="updateProfileBtn" onclick="updateProfileWithOTP()" disabled>
                    Update Profile
                </button>
            </div>

            <div id="updateStatus" class="status"></div>
        </div>

        <!-- Section 3: Firebase Phone Authentication -->
        <div class="section">
            <h2>🔐 Firebase Phone Authentication</h2>

            <div class="form-group">
                <label for="firebasePhone">Phone Number</label>
                <input 
                    type="tel" 
                    id="firebasePhone" 
                    placeholder="+919876543210"
                >
            </div>

            <div id="recaptcha-container"></div>

            <button onclick="signInWithPhone()">Sign In with Phone</button>

            <div id="firebaseOtpContainer" style="display: none; margin-top: 20px;">
                <div class="form-group">
                    <label for="firebaseOtpInput">Enter OTP sent to your phone</label>
                    <input 
                        type="text" 
                        id="firebaseOtpInput" 
                        placeholder="123456"
                        maxlength="6"
                    >
                </div>
                <button onclick="verifyFirebasePhoneOTP()">Verify OTP</button>
            </div>

            <div id="firebaseStatus" class="status"></div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasefiles/9.22.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasefiles/9.22.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasefiles/9.22.0/firebase-firestore.js"></script>

    <!-- Firebase Configuration and OTP Functions -->
    <script src="/ui/firebase-config.js"></script>

    <script>
        // Helper functions for HTML page
        function generateOTP() {
            const phone = document.getElementById('regPhone').value;
            const email = document.getElementById('regEmail').value;

            if (!phone && !email) {
                showStatus('regStatus', 'Please enter phone number or email', 'error');
                return;
            }

            // Call the function from firebase-config.js
            fetch('/api/send-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    phoneNumber: phone || null,
                    email: email || null
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showStatus('regStatus', `✅ OTP sent! Expires in ${data.expiresIn}`, 'success');
                    document.getElementById('regOtpContainer').style.display = 'block';
                } else {
                    showStatus('regStatus', `❌ ${data.error}`, 'error');
                }
            })
            .catch(err => {
                console.error(err);
                showStatus('regStatus', '❌ Error sending OTP', 'error');
            });
        }

        function verifyRegistrationOTP() {
            const phone = document.getElementById('regPhone').value;
            const otp = document.getElementById('regOtpInput').value;

            if (!otp) {
                showStatus('regStatus', 'Please enter OTP', 'error');
                return;
            }

            fetch('/api/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    phoneNumber: phone,
                    otp: otp
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.verified) {
                    showStatus('regStatus', `✅ ${data.message}`, 'success');
                    // Proceed with registration
                } else {
                    showStatus('regStatus', `❌ ${data.message}`, 'error');
                }
            })
            .catch(err => {
                console.error(err);
                showStatus('regStatus', '❌ Error verifying OTP', 'error');
            });
        }

        function sendProfileUpdateOTP() {
            const phone = document.getElementById('profilePhone').value;
            const email = document.getElementById('profileEmail').value;

            if (!phone && !email) {
                showStatus('profileOtpStatus', 'Please enter phone or email', 'error');
                return;
            }

            fetch('/api/send-profile-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    phoneNumber: phone || null,
                    email: email || null
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.success) {
                    showStatus('profileOtpStatus', `✅ ${data.message}`, 'success');
                    document.getElementById('profileOtpContainer').style.display = 'block';
                } else {
                    showStatus('profileOtpStatus', `❌ ${data.error}`, 'error');
                }
            })
            .catch(err => {
                console.error(err);
                showStatus('profileOtpStatus', '❌ Error sending OTP', 'error');
            });
        }

        function verifyProfileUpdateOTP() {
            const phone = document.getElementById('profilePhone').value;
            const otp = document.getElementById('profileOtpInput').value;

            if (!otp) {
                showStatus('profileVerifyStatus', 'Please enter OTP', 'error');
                return;
            }

            fetch('/api/verify-otp', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    phoneNumber: phone,
                    otp: otp
                })
            })
            .then(res => res.json())
            .then(data => {
                if (data.verified) {
                    showStatus('profileVerifyStatus', `✅ ${data.message}`, 'success');
                    document.getElementById('profileForm').style.display = 'block';
                    document.getElementById('updateProfileBtn').disabled = false;
                } else {
                    showStatus('profileVerifyStatus', `❌ ${data.message}`, 'error');
                }
            })
            .catch(err => {
                console.error(err);
                showStatus('profileVerifyStatus', '❌ Error verifying OTP', 'error');
            });
        }

        function updateProfileWithOTP() {
            const phone = document.getElementById('profilePhone').value;
            const data = {
                mobile: phone,
                full_name: document.getElementById('fullName').value,
                village: document.getElementById('village').value,
                mandal: document.getElementById('mandal').value,
                district: document.getElementById('district').value,
                aadhaar: document.getElementById('aadhaar').value,
                profile_image: document.getElementById('profileImage').value
            };

            fetch('/api/update-profile', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(result => {
                if (result.success) {
                    showStatus('updateStatus', '✅ Profile updated successfully!', 'success');
                } else {
                    showStatus('updateStatus', `❌ ${result.error}`, 'error');
                }
            })
            .catch(err => {
                console.error(err);
                showStatus('updateStatus', '❌ Error updating profile', 'error');
            });
        }

        function signInWithPhone() {
            // This requires Firebase Setup
            console.log('Firebase phone sign in not configured yet');
            showStatus('firebaseStatus', 'Configure Firebase in firebase-config.js first', 'info');
        }

        function verifyFirebasePhoneOTP() {
            console.log('Firebase OTP verification not ready');
        }

        function showStatus(elementId, message, type) {
            const element = document.getElementById(elementId);
            element.textContent = message;
            element.className = 'status show ' + type;
        }
    </script>
</body>
</html>
